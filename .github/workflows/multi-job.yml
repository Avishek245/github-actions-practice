name: Multi job

on:
    push: 
        branches: [main]


jobs: 
    build: 
        runs-on: ubuntu-latest
        steps: 
            - name: Build code
              run: echo "Building code..."

    test: 
        runs-on: ubuntu-latest
        needs: build
        steps: 
            - name: Run tests
              run: echo "Running tests..."

    deploy: 
        runs-on: ubuntu-latest
        needs: test
        steps:  
            - name: Deploy code
              run: echo "Deploying code..."