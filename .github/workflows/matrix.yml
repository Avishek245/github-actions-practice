name: Matrix Build

on: 
    push: 
        branches: [main]

jobs:
    matrix-build: 
        runs-on: ubuntu-latest
        strategy: 
            fail-fast: false
            matrix: 
                python-version: ["3.10",3.11","3.12","3.13"] 
                exclude: 
                    - os: window-latest
                      python-version: "3.11"
                       

        steps: 
            - name: checkout code
              uses: actions/checkout@v4

            - name: set up python
              uses: actions/setup-python@v5
              with: 
                python-version: ${{ matrix.python-version }}

            - name: python version
              run: python --version

