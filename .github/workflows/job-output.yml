name: Job out demo

on:
    push:


jobs: 
    generate-date: 
        runs-on: ubuntu-latest
        outputs:
            TODAY: ${{ steps.set-output.outputs.today }}

        steps: 
            - name: set output
              id: set-output
              run: echo "today=$(date)" >> $GITHUB_OUTPUT #runs on step level

    use-date:
        runs-on: ubuntu-latest
        needs: generate-date
        steps: 
            - name: use output
              run: echo "Today's date is ${{ needs.generate-date.outputs.TODAY }}"         
