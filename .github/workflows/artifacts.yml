name: Artifacts-Demo

on: 
    push:
        branches: [main]
    workflow_dispatch:

jobs:
    job1:
        runs-on: ubuntu-latest
        steps:
            - name: create a test file
              run: echo "This is a test file content $(date) " > test.txt

            - name: Upload test file as artifact
              uses: actions/upload-artifact@v4
              with:
                name: test-file
                path: test.txt

    job2:
        runs-on: ubuntu-latest
        needs: job1
        steps:
            - name: Download test file artifact
              uses: actions/download-artifact@v4
              with:
                name: test-file
            - run: cat test.txt